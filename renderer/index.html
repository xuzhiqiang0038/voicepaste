<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Overlay</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="overlay">
      <section class="stage" id="stage" data-state="idle">
        <div class="bubble" id="bubble" data-wrap="single">
          <div class="transcript" id="transcript">
            <span class="final-text" id="finalText"></span>
            <span class="partial-text" id="partialText"></span>
          </div>
          <div class="hint" id="hint" data-variant="text" data-visible="false">
            <span class="hint-label" id="hintLabel"></span>
            <span class="hint-progress" id="hintProgress" aria-hidden="true">
              <span class="hint-progress-bar"></span>
            </span>
          </div>
        </div>

        <div class="waveform-slot" id="waveformSlot" aria-hidden="true">
          <div class="status-bars" id="statusBars" data-active="false">
            <span class="status-bar"></span>
            <span class="status-bar"></span>
            <span class="status-bar"></span>
            <span class="status-bar"></span>
            <span class="status-bar"></span>
            <span class="status-bar"></span>
            <span class="status-bar"></span>
            <span class="status-bar"></span>
            <span class="status-bar"></span>
            <span class="status-bar"></span>
          </div>
        </div>
      </section>
    </main>
    <div class="measure-text" id="measureText"></div>
    <script src="./app.js"></script>
  </body>
  </html>
