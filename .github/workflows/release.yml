name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  win-x64:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $expectedTag = "v$version"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $expectedTag."
          }

      - run: pnpm lint:ci

      - name: Build Windows x64 installer
        run: pnpm run pack -p win-x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VoicePaste-*-win-x64.exe
            dist/VoicePaste-*-win-x64.exe.blockmap
            dist/latest.yml
